}

android {
    namespace 'com.dextzy.shop'
    compileSdk 34

    defaultConfig {
        applicationId "com.dextzy.shop"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
